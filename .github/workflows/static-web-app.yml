name: Deploy (Azure Static Web Apps)

# Builds the no-API ("static") site and deploys it to Azure Static Web Apps.
#
# Inert until you opt in:
#   1. Create a Static Web App in Azure (Free tier), copy its deployment token.
#   2. Repo → Settings → Secrets → Actions → add AZURE_STATIC_WEB_APPS_API_TOKEN.
#   3. Repo → Settings → Variables → Actions → set STATIC_DEPLOY_ENABLED = true.
# Until STATIC_DEPLOY_ENABLED is "true" the jobs are skipped (no red checks).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: ${{ vars.STATIC_DEPLOY_ENABLED == 'true' && (github.event_name != 'pull_request' || github.event.action != 'closed') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: corepack enable
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm rebuild esbuild
      - run: pnpm --filter web-react build:static

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: frontend/apps/web-react/dist
          skip_app_build: true
          skip_api_build: true

  close_pr:
    if: ${{ vars.STATIC_DEPLOY_ENABLED == 'true' && github.event_name == 'pull_request' && github.event.action == 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
