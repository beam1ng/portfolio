# Local development stack. `docker compose up` brings services online.
# Phase 1: only MSSQL is active. api + web services are scaffolded as commented
# blocks and get enabled in Phase 5 once their Dockerfiles exist.

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: portfolio-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}"
      MSSQL_PID: "Developer"
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

