# Full local stack: mssql + api + web. `docker compose up --build` runs everything.
# The web container (nginx) reverse-proxies /api to the api container, so the
# browser talks to a single origin.

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: portfolio-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}"
      MSSQL_PID: "Developer"
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: portfolio-api
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Default: "Server=mssql,1433;Database=${MSSQL_DB:-PortfolioDb};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      Jwt__Issuer: "${JWT__ISSUER:-portfolio-api}"
      Jwt__Audience: "${JWT__AUDIENCE:-portfolio-web}"
      Jwt__SigningKey: "${JWT__SIGNINGKEY:?set JWT__SIGNINGKEY in .env}"
      Admin__Email: "${ADMIN__EMAIL:-admin@example.com}"
      Admin__Password: "${ADMIN__PASSWORD:?set ADMIN__PASSWORD in .env}"
      # Seed real content from the committed export so a `down -v` reset restores
      # it instead of placeholders. Mounted read-only just below.
      SEED_CONTENT_PATH: /seed/content.json
      # Drag-and-drop admin uploads are written straight into the repo's
      # public/images (bind-mounted below), so they serve immediately and are
      # committed for the static deploy.
      Uploads__Path: /srv/images
    volumes:
      - ./frontend/apps/web-react/public/content.json:/seed/content.json:ro
      - ./frontend/apps/web-react/public/images:/srv/images
    ports:
      - "${API_HTTP_PORT:-8080}:8080"

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: portfolio-web
    depends_on:
      - api
    # Serve newly uploaded images live from the host dir the API writes to,
    # so they appear without rebuilding the SPA bundle. Read-only: nginx only
    # reads; the API owns writes.
    volumes:
      - ./frontend/apps/web-react/public/images:/usr/share/nginx/html/images:ro
    ports:
      - "${WEB_PORT:-5173}:80"

volumes:
  mssql-data:
